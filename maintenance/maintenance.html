<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Maintenance | MTG Collection Builder</title>
  <link rel="shortcut icon" type="image/x-icon" href="https://r2.mtgcollectionbuilder.com/images/favicon.ico">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #050a30 0%, #2e0845 100%);
      color: #fff;
      position: relative;
    }

    /* Subtle cross pattern overlay matching the home page */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }


    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
      padding: 0 24px;
    }

    .logo {
      height: 200px;
      width: auto;
      filter: brightness(1.1) drop-shadow(0 4px 6px rgba(0,0,0,0.3));
      margin-bottom: 24px;
    }

    @media (min-width: 768px) {
      .logo {
        height: 300px;
      }
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    @media (min-width: 768px) {
      .title {
        font-size: 2rem;
      }
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.95;
      margin-bottom: 24px;
    }

    @media (min-width: 768px) {
      .subtitle {
        font-size: 1.25rem;
      }
    }

    .message {
      font-size: 0.95rem;
      opacity: 0.75;
      line-height: 1.6;
      max-width: 450px;
      margin: 0 auto;
    }

    /* Wrench icon */
    .icon {
      margin-bottom: 20px;
    }

    .icon svg {
      width: 48px;
      height: 48px;
      fill: rgba(255, 255, 255, 0.7);
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(45deg, #1565c0, #1976d2);
      border-radius: 2px;
      margin: 24px auto;
      box-shadow: 0 2px 8px rgba(33, 150, 243, 0.3);
    }
  </style>
  <base target="_parent" />
</head>
<body>
  <div class="container">
    <img
      class="logo"
      src="https://r2.mtgcollectionbuilder.com/images/mtgcb-logo.png"
      alt="MTG Collection Builder Logo"
    />
    <div class="title">Down for Maintenance</div>
    <div class="subtitle">We'll be back shortly!</div>
    <div class="divider"></div>
    <div class="message">
      MTG Collection Builder is currently undergoing scheduled maintenance.
      Please check back in a few minutes.
    </div>
  </div>
</body>
</html>
